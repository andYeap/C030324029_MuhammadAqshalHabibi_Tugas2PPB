name: flutter_1
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - img/
    - assets/images/
  fonts:
    - family: "Fredoka"
      fonts:
        - asset: assets/fonts/fredoka.ttf
        - asset: assets/fonts/Fredoka-Bold.ttf
    - family: "Linotte"
      fonts:
        - asset: assets/fonts/linotte/Linotte-Regular.otf
        - asset: assets/fonts/linotte/Linotte-Bold.otf
        - asset: assets/fonts/linotte/Linotte-Light.otf
        - asset: assets/fonts/linotte/Linotte-Heavy.otf
        - asset: assets/fonts/linotte/Linotte-Semi-Bold.otf
